<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Portfolio Dashboard</h1>
        <form id="portfolioForm">
            <h2>Personal Information</h2>

            <input type="email" id="email" placeholder="Email" required>

            <input type="text" id="fullName" placeholder="Full Name" required>

            <input type="text" id="title" placeholder="Title" required>

            <input type="text" id="profileImage" placeholder="Profile Image URL">

            <textarea id="about" placeholder="About Me" required></textarea>

            <h2>Skills</h2>

            <input type="text" id="skills" placeholder="HTML,CSS,JavaScript,React" required>

            <h2>Education</h2>

            <input type="text" id="college" placeholder="College" required>

            <input type="text" id="degree" placeholder="Degree" required>

            <input type="text" id="year" placeholder="Year" required>

            <h2>Projects</h2>

            <input type="text" id="projectTitle" placeholder="Project Title" required>

            <textarea id="projectDescription" placeholder="Project Description" required></textarea>

            <input type="text" id="github" placeholder="Github Link">

            <input type="text" id="liveLink" placeholder="Live Demo Link">

            <h2>Experience</h2>

            <input type="text" id="company" placeholder="Company">

            <input type="text" id="role" placeholder="Role">

            <input type="text" id="years" placeholder="Years">

            <h2>Social Links</h2>

            <input type="text" id="githubSocial" placeholder="Github Profile">

            <input type="text" id="linkedin" placeholder="LinkedIn">

            <input type="text" id="instagram" placeholder="Instagram">

            <button type="submit">Create Portfolio</button>

            <button type="button" id="getBtn">Get Portfolio</button>

            <button type="button" id="updateBtn">Update Portfolio</button>

            <button type="button" id="deleteBtn">Delete Portfolio</button>

            <a href="portfolio.html">
                <button type="button">Preview Portfolio</button>
            </a>

            <a href="login.html">
                <button type="button">Logout</button>
            </a>
        </form>
    </div>

    <script src="./js/dashboard.js"></script>
</body>
</html>
